<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Neon Editorial</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

  <style>
    /* =============================================
       UNIVERSAL RESET & SIZING
    ============================================= */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0; 
      padding: 0;
    }
    
    html {
      font-size: 16px; 
      scroll-behavior: smooth;
    }

    /* =============================================
       DESIGN TOKENS
    ============================================= */
    :root {
      --primary:              #81ecff;
      --primary-dim:          #00d4ec;
      --primary-container:    #00e3fd;
      --on-primary:           #005762;

      --secondary:            #ff51fa;
      --secondary-dim:        #ff51fa;
      --secondary-container:  #a900a9;
      --on-secondary:         #400040;
      --on-secondary-container: #fff5f9;

      --tertiary:             #ff833f;
      --tertiary-dim:         #ff7520;
      --tertiary-fixed:       #ff955e;
      --on-tertiary:          #481900;

      /* FORCED PURE BLACK */
      --surface:                   #000000; 
      --surface-bright:            #292c2f;
      --surface-container-low:     #111416;
      --surface-container:         #171a1c;
      --surface-container-high:    #1d2022;
      --surface-container-highest: #232629;

      --on-surface:       #eeeef0;
      --on-surface-variant: #aaabad;
      --on-background:    #eeeef0;
      --outline-variant:  #46484a;

      --font-headline: 'Space Grotesk', sans-serif;
      --font-body:     'Manrope', sans-serif;
      --font-label:    'Plus Jakarta Sans', sans-serif;

      --nav-h: 80px;
    }

    /* Light Mode Overrides */
    :root.light-mode {
      --primary:           #00606f; 
      --primary-dim:       #004e5b;
      --primary-container: #81ecff;
      --on-primary:        #ffffff;

      --secondary:         #c218bb; 
      --secondary-container: #ffdfef;
      --on-secondary:      #ffffff;

      --surface:                   #f8fafc;
      --surface-bright:            #ffffff;
      --surface-container-low:     #f1f5f9;
      --surface-container:         #e2e8f0;
      --surface-container-high:    #d1d5db;
      --surface-container-highest: #94a3b8;

      --on-surface:       #0f172a;
      --on-surface-variant: #475569;
      --on-background:    #0f172a;
      --outline-variant:  #cbd5e1;
    }

    /* =============================================
       BASE STYLES & NUKE THE GLOW
    ============================================= */
    body {
      font-family: var(--font-body);
      background-color: #000000 !important; /* Forced Black */
      background-image: none !important; /* Kill body glows */
      color: var(--on-surface);
      overflow-x: hidden;
      line-height: 1.6;
      transition: background-color 0.35s ease, color 0.35s ease;
    }
    
    img   { display: block; max-width: 100%; }
    a     { text-decoration: none; color: inherit; }
    button{ cursor: pointer; border: none; background: none; font-family: inherit; }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
      line-height: 1;
    }

    /* =============================================
       LAYOUT
    ============================================= */
    .container {
      max-width: 1400px;
      margin-inline: auto;
      padding-inline: 2rem;
    }
    
    /* FIX: Added proper spacing for the main content so it sits under the nav */
    .content-wrapper {
      max-width: 1400px;
      margin-inline: auto;
      padding-inline: 2rem;
      padding-top: calc(var(--nav-h) + 2rem); 
      padding-bottom: 4rem;
    }

    @media (max-width: 480px) { 
      .container, .content-wrapper { padding-inline: 1.25rem; } 
    }

    /* =============================================
       NAVIGATION
    ============================================= */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      z-index: 1000;
      background: rgba(0, 0, 0, 0.85) !important; /* Pure black glass */
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid transparent;
      transition: background 0.3s, border-color 0.3s;
    }
    
    .nav.scrolled {
      background: rgba(0, 0, 0, 0.97) !important; /* Pure black scrolled */
      border-color: rgba(70,72,74,0.3);
    }
    
    .nav__inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 100%;
      max-width: 1400px;
      margin-inline: auto;
      padding-inline: 2rem;
      background: transparent !important;
      box-shadow: none !important;
    }
    
    /* Kill all pseudo-element container glows */
    .nav::before, .nav::after, .nav__inner::before, .nav__inner::after {
      display: none !important;
      background: transparent !important;
      box-shadow: none !important;
    }

    .nav__logo {
      font-family: var(--font-headline);
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--primary);
      
      /* Nuke specific logo glows */
      background: transparent !important; 
      box-shadow: none !important;
      text-shadow: none !important;
    }
    
    .nav__logo::before, .nav__logo::after {
      display: none !important;
      content: none !important;
    }

    /* Desktop nav groups */
    .nav__groups {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      list-style: none;
    }
    .nav__group { position: relative; }
    .nav__group-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: var(--font-body);
      font-size: 0.88rem;
      color: rgba(238,238,240,0.8);
      padding: 1rem 0;
      transition: color 0.25s;
    }
    .nav__group-btn:hover,
    .nav__group-btn.active { color: var(--primary); }
    .nav__group-btn.active-dot::after {
      content: '';
      display: block;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 8px var(--primary);
      margin: 3px auto 0;
    }

    /* Dropdown */
    .nav__dropdown {
      position: absolute;
      top: 100%; left: 0;
      min-width: 180px;
      background: var(--surface-container-high);
      border: 1px solid rgba(70,72,74,0.2);
      border-radius: 0.75rem;
      padding: 0.5rem 0;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      backdrop-filter: blur(16px);
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
    }
    .nav__group:hover .nav__dropdown,
    .nav__group:focus-within .nav__dropdown {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .nav__dropdown a {
      display: block;
      padding: 0.75rem 1.5rem;
      font-size: 0.85rem;
      color: rgba(238,238,240,0.8);
      transition: color 0.2s, background 0.2s;
    }
    .nav__dropdown a:hover     { color: var(--primary); background: rgba(129,236,255,0.06); }
    .nav__dropdown a.dd-active { color: var(--primary); background: rgba(129,236,255,0.05); font-weight: 700; }

    .nav__search {
      color: var(--on-surface);
      display: flex;
      align-items: center;
      transition: transform 0.2s;
    }
    .nav__search:hover  { transform: scale(1.1); }
    .nav__search:active { transform: scale(0.92); }

    .nav__actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .nav__btn {
      color: var(--on-surface);
      display: flex;
      align-items: center;
      padding: 0.5rem;
      border-radius: 50%;
      transition: background 0.2s, transform 0.2s;
    }
    .nav__btn:hover { background: rgba(129,236,255,0.1); transform: scale(1.1); }
    .nav__btn:active { transform: scale(0.95); }

    /* Welcome Banner */
    #welcome-banner {
      display: none;
      font-family: var(--font-label);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--primary);
      margin-right: 1rem;
    }

    /* Settings Panel */
    .settings-panel {
      position: fixed;
      top: calc(var(--nav-h) + 12px);
      right: 2rem;
      width: 280px;
      background: var(--surface-container-high);
      border: 1px solid var(--outline-variant);
      border-radius: 1rem;
      padding: 1.5rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      z-index: 1100;
      opacity: 0;
      transform: translateY(-20px) scale(0.95);
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      backdrop-filter: blur(20px);
    }
    .settings-panel.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }
    .settings-panel h3 {
      font-family: var(--font-headline);
      font-size: 1.1rem;
      margin-bottom: 1rem;
      color: var(--primary);
    }
    .settings-input {
      width: 100%;
      background: var(--surface-container-low);
      border: 1px solid var(--outline-variant);
      border-radius: 0.5rem;
      padding: 0.75rem;
      color: var(--on-surface);
      font-family: var(--font-body);
      margin-bottom: 1.25rem;
    }
    .settings-save {
      width: 100%;
      background: var(--primary);
      color: var(--on-primary);
      padding: 0.75rem;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Hamburger */
    .nav__hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      width: 28px;
      cursor: pointer;
      padding: 4px;
    }
    .nav__hamburger span {
      display: block; height: 2px;
      background: var(--on-surface);
      border-radius: 2px;
      transition: transform 0.35s, opacity 0.25s, width 0.25s;
    }
    .nav__hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav__hamburger.open span:nth-child(2) { opacity: 0; width: 0; }
    .nav__hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* Mobile drawer */
    .nav__drawer {
      position: fixed;
      top: var(--nav-h); left: 0; right: 0;
      background: rgba(0,0,0,0.97) !important; /* Forced Black */
      backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(70,72,74,0.3);
      padding: 1.5rem 2rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      transform: translateY(-110%);
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
      z-index: 999;
    }
    .nav__drawer.open { transform: translateY(0); }
    .nav__drawer a {
      font-family: var(--font-label);
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: rgba(238,238,240,0.75);
      padding: 0.65rem 0;
      border-bottom: 1px solid rgba(70,72,74,0.2);
      transition: color 0.2s;
    }
    .nav__drawer a:last-child { border-bottom: none; }
    .nav__drawer a:hover { color: var(--primary); }

    @media (max-width: 768px) {
      .nav__groups    { display: none; }
      .nav__hamburger { display: flex; }
    }
    
    /* =============================================
       CONTACT FORM STYLES
    ============================================= */
    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      max-width: 600px;
      margin-top: 2rem;
      background: var(--surface-container-high);
      padding: 2rem;
      border: 1px solid rgba(70,72,74,0.2);
      border-radius: 12px;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    
    .form-group label {
      font-family: var(--font-label);
      font-size: 0.9rem;
      color: var(--primary);
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    
    .form-group input, 
    .form-group select, 
    .form-group textarea {
      background: var(--surface);
      border: 1px solid rgba(129,236,255,0.2);
      color: var(--on-surface);
      padding: 0.8rem 1rem;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    
    .form-group input:focus, 
    .form-group select:focus, 
    .form-group textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 10px rgba(129,236,255,0.2);
    }
    
    .submit-btn {
      background: var(--primary);
      color: var(--on-primary);
      font-family: var(--font-headline);
      font-weight: 700;
      font-size: 1rem;
      padding: 1rem;
      border-radius: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: background 0.3s, transform 0.2s;
      margin-top: 1rem;
    }
    
    .submit-btn:hover {
      background: var(--primary-container);
      transform: translateY(-3px);
    }

    
  </style>
</head>
<body>

  <nav class="nav" id="main-nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">NEON EDITORIAL</a>

      <ul class="nav__groups" role="list">
        <li class="nav__group">
          <button class="nav__group-btn">
            Main <span class="material-symbols-outlined" style="font-size:1rem">expand_more</span>
          </button>
          <div class="nav__dropdown">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
          </div>
        </li>
        <li class="nav__group">
          <button class="nav__group-btn">
            Content <span class="material-symbols-outlined" style="font-size:1rem">expand_more</span>
          </button>
          <div class="nav__dropdown">
            <a href="news.html">News</a>
            <a href="events.html">Events</a>
          </div>
        </li>
        <li class="nav__group">
          <button class="nav__group-btn">
            Community <span class="material-symbols-outlined" style="font-size:1rem">expand_more</span>
          </button>
          <div class="nav__dropdown" style="min-width:210px">
            <a href="gallery.html">Cosplay Gallery</a>
            <a href="spotlight.html">Spotlight</a>
          </div>
        </li>
        <li class="nav__group">
          <button class="nav__group-btn active-dot" style="color:var(--primary)">
            Interaction <span class="material-symbols-outlined" style="font-size:1rem">expand_more</span>
          </button>
          <div class="nav__dropdown">
            <a href="reviews.html">Reviews</a>
            <a href="contact.html" class="dd-active">Contact</a>
          </div>
        </li>
      </ul>

      <div class="nav__actions">
        <span id="welcome-banner">Welcome, Guest</span>
        <button id="theme-toggle" class="nav__btn" aria-label="Toggle theme">
          <span class="material-symbols-outlined" id="theme-icon">light_mode</span>
        </button>
        <button id="user-toggle" class="nav__btn" aria-label="User settings">
          <span class="material-symbols-outlined">account_circle</span>
        </button>
        <button class="nav__search" aria-label="Search">
          <span class="material-symbols-outlined">search</span>
        </button>
      </div>

      <button class="nav__hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="nav__drawer" id="mobile-menu">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="news.html">News</a>
    <a href="events.html">Events</a>
    <a href="gallery.html">Cosplay Gallery</a>
    <a href="spotlight.html">Spotlight</a>
    <a href="reviews.html">Reviews</a>
    <a href="contact.html" style="color: var(--primary);">Contact</a>
  </div>

  <div class="settings-panel" id="settings-panel">
    <h3>Account Settings</h3>
    <input type="text" class="settings-input" placeholder="Display Name">
    <button class="settings-save">Save Changes</button>
  </div>

  <div class="content-wrapper">
    <h1>Contact Us</h1>
    <p>Get in touch with the Neon Editorial team.</p>
    
    <form class="contact-form" action="#" method="POST">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" placeholder="Type your message here..." required></textarea>
      </div>

      <button type="submit" class="submit-btn">Send Message</button>
    </form>
  </div>

  <script>
    // --- THEME TOGGLE LOGIC ---
  const themeToggle = document.getElementById('theme-toggle');
  const themeIcon = document.getElementById('theme-icon');
  
  const toggleTheme = () => {
    const isLight = document.documentElement.classList.toggle('light-mode');
    themeIcon.textContent = isLight ? 'dark_mode' : 'light_mode';
    localStorage.setItem('user_theme', isLight ? 'light' : 'dark');
  };

  if (localStorage.getItem('user_theme') === 'light') {
    document.documentElement.classList.add('light-mode');
    themeIcon.textContent = 'dark_mode';
  }
  themeToggle.addEventListener('click', toggleTheme);


  // --- USER SETTINGS LOGIC ---
  const userToggle = document.getElementById('user-toggle');
  const settingsPanel = document.getElementById('settings-panel');
  const welcomeBanner = document.getElementById('welcome-banner');
  const settingsInput = document.querySelector('.settings-input');
  const settingsSave = document.querySelector('.settings-save');

  // Load existing name from localStorage
  const savedName = localStorage.getItem('display_name');
  if (savedName) {
    welcomeBanner.textContent = `Welcome, ${savedName}`;
    welcomeBanner.style.display = 'block';
    settingsInput.value = savedName;
  }

  userToggle.addEventListener('click', () => settingsPanel.classList.toggle('open'));

  settingsSave.addEventListener('click', () => {
    const name = settingsInput.value.trim();
    if (name) {
      localStorage.setItem('display_name', name);
      welcomeBanner.textContent = `Welcome, ${name}`;
      welcomeBanner.style.display = 'block';
      settingsPanel.classList.remove('open');
      alert("Profile updated!");
    }
  });


  // --- CONTACT FORM LOCAL STORAGE (Chapter 4) ---
  const contactForm = document.querySelector('.contact-form');

  contactForm.addEventListener('submit', (e) => {
    e.preventDefault(); // Stop page from refreshing

    // 1. Create an object with the form data
    const newInquiry = {
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      message: document.getElementById('message').value,
      date: new Date().toLocaleString()
    };

    // 2. Get existing messages from localStorage, or an empty array if none exist
    // Chapter 4: Use getItem and JSON.parse to turn string back into object
    const existingInquiries = JSON.parse(localStorage.getItem('all_inquiries')) || [];

    // 3. Add the new message to the list
    existingInquiries.push(newInquiry);

    // 4. Save the updated list back to localStorage
    // Chapter 4: Use setItem and JSON.stringify to turn object into string
    localStorage.setItem('all_inquiries', JSON.stringify(existingInquiries));

    // 5. Success feedback
    alert("Saved to Local Storage!");
    contactForm.reset();
  });


  // --- MOBILE MENU LOGIC ---
  const hamburger = document.getElementById('hamburger');
  const mobileMenu = document.getElementById('mobile-menu');
  hamburger.addEventListener('click', () => {
    hamburger.classList.toggle('open');
    mobileMenu.classList.toggle('open');
  });
  </script>
</body>
</html>
